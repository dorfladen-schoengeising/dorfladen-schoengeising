<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAN &amp; NAN Finder — Dorfladen Schöngeising</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf7f2;--warm:#f0ebe0;--brown:#5c3d1e;--brown-light:#8b6340;
  --green:#2d5016;--green-mid:#4a7c2f;--green-light:#e8f0e0;
  --gold:#c9962a;--text:#1a1208;--text-soft:#6b5744;--border:#d4c9b4;
  --shadow:rgba(92,61,30,0.12);--blue:#1a5276;--blue-light:#d6eaf8;
  --red-light:#fdecea;--red:#c0392b;
}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--green);padding:26px 24px 20px;text-align:center;position:relative;overflow:hidden}
header::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,0.03) 12px,rgba(255,255,255,0.03) 13px)}
.header-tag{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:5px}
header h1{font-family:"DM Serif Display",serif;font-size:clamp(24px,5vw,36px);color:#fff;letter-spacing:-0.5px;line-height:1.1}
header h1 span{color:var(--gold)}
.header-sub{margin-top:5px;font-size:12px;color:rgba(255,255,255,0.55);font-weight:300}

/* CONTROLS */
.controls{max-width:680px;margin:24px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:12px}
.scope-row{display:flex;gap:10px;align-items:center}
.scope-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);white-space:nowrap}
.scope-toggle{display:flex;background:var(--warm);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.scope-btn{flex:1;padding:8px 14px;border:none;background:none;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.scope-btn.active{background:var(--green);color:#fff}
.scope-btn:hover:not(.active){color:var(--green)}
.search-modes{display:flex;gap:6px}
.mode-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);background:#fff;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all 0.15s;text-align:center}
.mode-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.mode-btn:hover:not(.active){border-color:var(--green-mid);color:var(--green)}

/* SEARCH ROW */
.search-box{position:relative;display:flex;gap:8px;align-items:center}
.search-input-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-soft);pointer-events:none;font-size:18px}
#search-input{width:100%;padding:15px 44px 15px 46px;border:2px solid var(--border);border-radius:12px;font-family:"DM Sans",sans-serif;font-size:16px;background:#fff;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none}
#search-input:focus{border-color:var(--green-mid);box-shadow:0 0 0 4px rgba(74,124,47,0.12)}
#search-input::placeholder{color:#bbb}
.clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-soft);font-size:20px;padding:4px;display:none;line-height:1}
.clear-btn.visible{display:block}

/* SCANNER BUTTON */
.scan-btn{flex-shrink:0;width:52px;height:52px;border-radius:12px;border:2px solid var(--green-mid);background:var(--green-light);color:var(--green);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.scan-btn:hover{background:var(--green);color:#fff}
.scan-btn.scanning{background:var(--green);color:#fff;border-color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,80,22,0.4)}50%{box-shadow:0 0 0 8px rgba(45,80,22,0)}}

/* SCANNER OVERLAY */
.scanner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;flex-direction:column;align-items:center;justify-content:center}
.scanner-overlay.active{display:flex}
.scanner-box{position:relative;width:min(340px,92vw);background:#000;border-radius:16px;overflow:hidden}
.scanner-box video{width:100%;display:block;border-radius:16px;max-height:60vh;object-fit:cover}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:90px;border:2px solid var(--gold);border-radius:6px;pointer-events:none}
.scan-frame::before,.scan-frame::after{content:"";position:absolute;width:20px;height:20px;border-color:var(--gold);border-style:solid}
.scan-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px}
.scan-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0}
.scanner-error{background:var(--red-light);border:1px solid var(--red);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);display:none;margin-top:4px}
.scanner-error.visible{display:block}

.hint{margin-top:8px;font-size:12px;color:var(--text-soft);text-align:center;min-height:16px}

/* STATS */
.stats-bar{max-width:680px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--warm);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-soft)}
.stat-pill strong{color:var(--brown)}

/* LOADING */
.loading{max-width:680px;margin:40px auto;padding:0 16px;text-align:center;color:var(--text-soft)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green-mid);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
.results-wrap{max-width:680px;margin:18px auto 40px;padding:0 16px}
.results-info{font-size:13px;color:var(--text-soft);margin-bottom:12px;padding-left:2px}
.results-info strong{color:var(--text)}
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:box-shadow 0.15s,border-color 0.15s;animation:slideIn 0.2s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-card:hover{box-shadow:0 4px 16px var(--shadow);border-color:var(--green-mid)}
.result-card.in-stamm{border-left:4px solid var(--green-mid)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.card-title{font-family:"DM Serif Display",serif;font-size:17px;color:var(--text);line-height:1.2}
.card-brand{font-size:12px;color:var(--text-soft);margin-top:2px}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.badge{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-stamm{background:var(--green-light);color:var(--green)}
.badge-quelle{background:var(--warm);color:var(--brown-light);border:1px solid var(--border)}
.price-block{display:flex;gap:10px;align-items:stretch;margin-bottom:12px}
.price-box{flex:1;border-radius:10px;padding:10px 12px;text-align:center}
.price-box .plabel{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.price-box .pval{font-family:"DM Serif Display",serif;font-size:22px;line-height:1}
.price-dl{background:var(--blue-light)}
.price-dl .plabel{color:var(--blue)}
.price-dl .pval{color:var(--blue)}
.price-rewe{background:var(--green-light)}
.price-rewe .plabel{color:var(--green)}
.price-rewe .pval{color:var(--green)}
.price-diff{flex:0.7;border-radius:10px;padding:10px 8px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.price-diff .plabel{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.price-diff .pval{font-size:15px;font-weight:600;line-height:1.3}
.diff-teurer{background:var(--red-light)}
.diff-teurer .plabel,.diff-teurer .pval{color:var(--red)}
.diff-gleich{background:var(--warm)}
.diff-gleich .plabel,.diff-gleich .pval{color:var(--text-soft)}
.diff-guenstiger{background:#e8f5e9}
.diff-guenstiger .plabel,.diff-guenstiger .pval{color:#2e7d32}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
@media(max-width:380px){.card-grid{grid-template-columns:1fr}}
.field-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:2px}
.field-val{font-size:13px;font-weight:500;color:var(--text);font-feature-settings:"tnum";word-break:break-all}
.field-val.mono{font-family:"Courier New",monospace;font-size:12px;letter-spacing:0.5px}
.field-val.empty{color:#ccc;font-style:italic;font-size:11px;font-weight:400}
.card-footer{margin-top:10px;padding-top:8px;border-top:1px solid var(--warm);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;background:var(--warm);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--brown-light)}
.mwst-e{background:#e8f4e8;color:#2d6a2d}
.mwst-r{background:#fef3e2;color:#8a5c00}
.empty-state{text-align:center;padding:56px 20px;color:var(--text-soft)}
.empty-state .icon{font-size:44px;margin-bottom:10px}
.empty-state h3{font-family:"DM Serif Display",serif;font-size:20px;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:14px;line-height:1.6}
.more-btn{display:block;width:100%;padding:13px;background:var(--warm);border:1.5px solid var(--border);border-radius:12px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--brown);cursor:pointer;text-align:center;transition:all 0.15s;margin-top:6px}
.more-btn:hover{background:var(--border)}
footer{text-align:center;padding:20px;font-size:11px;color:var(--border);letter-spacing:1px}
</style>
</head>
<body>

<header>
  <div class="header-tag">Dorfladen Schöngeising</div>
  <h1>EAN <span>&amp;</span> NAN Finder</h1>
  <p class="header-sub" id="header-sub">Artikel werden geladen ...</p>
</header>

<div class="controls">
  <div class="scope-row">
    <span class="scope-label">Sortiment</span>
    <div class="scope-toggle">
      <button class="scope-btn active" data-scope="all">Alle Artikel</button>
      <button class="scope-btn" data-scope="stamm">Nur Artikelstamm</button>
    </div>
  </div>
  <div class="search-modes">
    <button class="mode-btn active" data-mode="all">Alle Felder</button>
    <button class="mode-btn" data-mode="ean">EAN</button>
    <button class="mode-btn" data-mode="nan">NAN</button>
    <button class="mode-btn" data-mode="name">Artikelname</button>
  </div>
  <div class="search-box">
    <div class="search-input-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="EAN, NAN oder Artikelbezeichnung ..." autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
      <button class="clear-btn" id="clear-btn">&#x2715;</button>
    </div>
    <button class="scan-btn" id="scan-btn" title="Barcode scannen">&#128247;</button>
  </div>
  <div class="scanner-error" id="scanner-error"></div>
  <p class="hint" id="hint">Daten werden geladen ...</p>
</div>

<div class="stats-bar">
  <span class="stat-pill"><strong id="stat-total">–</strong> Artikel gesamt</span>
  <span class="stat-pill"><strong id="stat-stamm">–</strong> im Stamm</span>
  <span class="stat-pill"><strong>1.257</strong> mit Preisvergleich</span>
</div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-box">
    <video id="scanner-video" autoplay muted playsinline></video>
    <div class="scan-frame"></div>
  </div>
  <p class="scanner-label">Barcode mittig in den Rahmen halten</p>
  <p class="scanner-status" id="scanner-status"></p>
  <button class="scanner-close" id="scanner-close">Abbrechen</button>
</div>

<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <p>Artikeldaten werden geladen ...</p>
</div>

<div class="results-wrap">
  <div id="results-info" class="results-info" style="display:none"></div>
  <div id="results"></div>
</div>

<footer>DORFLADEN SCHÖNGEISING &middot; EAN-NAN FINDER</footer>

<!-- Barcode scanner library -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<script>
var RAW = [];
var mode = 'all';
var scope = 'all';
var currentResults = [];
var shown = 0;
var PAGE = 20;
var dataLoaded = false;

// ── DATA LOADING ──────────────────────────────────────────────
fetch('data.json')
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    RAW = data;
    dataLoaded = true;
    document.getElementById('loading').style.display = 'none';
    var total = RAW.length;
    var stamm = RAW.filter(function(r){return r.st===1;}).length;
    document.getElementById('stat-total').textContent = total.toLocaleString('de');
    document.getElementById('stat-stamm').textContent = stamm.toLocaleString('de');
    document.getElementById('header-sub').textContent = total.toLocaleString('de') + ' Artikel \u00b7 REWE-Sortiment';
    updateHint();
    doSearch();
  })
  .catch(function(err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--red)">&#9888; Daten konnten nicht geladen werden.<br><small>' + err.message + '</small></p>';
  });

// ── SCOPE / MODE ──────────────────────────────────────────────
document.querySelectorAll('.scope-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.scope-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    scope = btn.dataset.scope;
    doSearch();
  });
});

document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    mode = btn.dataset.mode;
    updateHint();
    doSearch();
  });
});

// ── SEARCH INPUT ──────────────────────────────────────────────
var input = document.getElementById('search-input');
var clearBtn = document.getElementById('clear-btn');

input.addEventListener('input', function() {
  clearBtn.classList.toggle('visible', input.value.length > 0);
  doSearch();
});
clearBtn.addEventListener('click', function() {
  input.value = '';
  clearBtn.classList.remove('visible');
  doSearch();
  input.focus();
});

function updateHint() {
  var hints = {
    all: 'Suche \u00fcber EAN, NAN oder Artikelbezeichnung',
    ean: 'EAN13 (13-stellig) oder EAN8 (8-stellig)',
    nan: 'NAN \u2014 7-stellig oder 8-stellig mit Pr\u00fcfziffer',
    name: 'Artikelname oder Marke eingeben'
  };
  document.getElementById('hint').textContent = dataLoaded ? hints[mode] : 'Daten werden geladen ...';
}

// ── BARCODE SCANNER ───────────────────────────────────────────
var scanBtn      = document.getElementById('scan-btn');
var overlay      = document.getElementById('scanner-overlay');
var videoEl      = document.getElementById('scanner-video');
var closeBtn     = document.getElementById('scanner-close');
var scanStatus   = document.getElementById('scanner-status');
var scannerError = document.getElementById('scanner-error');
var scanStream   = null;
var scanTimer    = null;
var zxingReader  = null;

scanBtn.addEventListener('click', function() {
  scannerError.classList.remove('visible');
  startScanner();
});
closeBtn.addEventListener('click', stopScanner);
overlay.addEventListener('click', function(e) { if (e.target === overlay) stopScanner(); });

function startScanner() {
  overlay.classList.add('active');
  scanBtn.classList.add('scanning');
  scanStatus.textContent = 'Kamera wird gestartet ...';

  // Use native BarcodeDetector if available (Chrome Android, some iOS 17+)
  if (typeof BarcodeDetector !== 'undefined') {
    startNativeScanner();
  } else if (typeof ZXingBrowser !== 'undefined') {
    startZXingScanner();
  } else {
    stopScanner();
    showScannerError('Scanner-Bibliothek nicht geladen. Bitte Seite neu laden.');
  }
}

function startNativeScanner() {
  var detector;
  try {
    detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','upc_a','upc_e','code_39'] });
  } catch(e) {
    startZXingScanner(); return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(function(stream) {
      scanStream = stream;
      videoEl.srcObject = stream;
      videoEl.play();
      scanStatus.textContent = 'Bereit — Barcode scannen ...';
      function tick() {
        if (!scanStream) return;
        if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
          detector.detect(videoEl).then(function(barcodes) {
            if (barcodes.length > 0) {
              onCodeFound(barcodes[0].rawValue);
            } else {
              scanTimer = requestAnimationFrame(tick);
            }
          }).catch(function() { scanTimer = requestAnimationFrame(tick); });
        } else {
          scanTimer = requestAnimationFrame(tick);
        }
      }
      scanTimer = requestAnimationFrame(tick);
    })
    .catch(handleCameraError);
}

function startZXingScanner() {
  var hints = new Map();
  var formats = [
    ZXingBrowser.BarcodeFormat.EAN_13,
    ZXingBrowser.BarcodeFormat.EAN_8,
    ZXingBrowser.BarcodeFormat.CODE_128,
    ZXingBrowser.BarcodeFormat.UPC_A,
    ZXingBrowser.BarcodeFormat.UPC_E
  ];
  hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, formats);

  zxingReader = new ZXingBrowser.BrowserMultiFormatReader(hints, {
    delayBetweenScanAttempts: 100,
    delayBetweenScanSuccess: 500
  });

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(function(stream) {
      scanStream = stream;
      videoEl.srcObject = stream;
      videoEl.play();
      scanStatus.textContent = 'Bereit — Barcode scannen ...';
      zxingReader.decodeFromStream(stream, videoEl, function(result, err) {
        if (result) onCodeFound(result.getText());
      });
    })
    .catch(handleCameraError);
}

function onCodeFound(code) {
  stopScanner();
  input.value = code;
  clearBtn.classList.add('visible');
  if (/^\d{8,13}$/.test(code)) {
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelector('.mode-btn[data-mode="ean"]').classList.add('active');
    mode = 'ean';
    updateHint();
  }
  doSearch();
  input.style.borderColor = 'var(--green-mid)';
  input.style.boxShadow = '0 0 0 4px rgba(74,124,47,0.25)';
  setTimeout(function(){ input.style.borderColor = ''; input.style.boxShadow = ''; }, 1500);
}

function stopScanner() {
  overlay.classList.remove('active');
  scanBtn.classList.remove('scanning');
  if (scanTimer) { cancelAnimationFrame(scanTimer); scanTimer = null; }
  if (zxingReader) { try { zxingReader.reset(); } catch(e){} zxingReader = null; }
  if (scanStream) { scanStream.getTracks().forEach(function(t){t.stop();}); scanStream = null; }
  videoEl.srcObject = null;
  scanStatus.textContent = '';
}

function handleCameraError(err) {
  stopScanner();
  var msg = 'Kamera-Zugriff nicht möglich.';
  var s = String(err);
  if (s.indexOf('NotAllowed') !== -1 || s.indexOf('Permission') !== -1)
    msg = 'Kamera-Zugriff verweigert — bitte in den Safari-Einstellungen erlauben.';
  else if (s.indexOf('NotFound') !== -1)
    msg = 'Keine Kamera gefunden.';
  showScannerError(msg);
}

function showScannerError(msg) {
  scannerError.textContent = msg;
  scannerError.classList.add('visible');
}

// ── SEARCH LOGIC ──────────────────────────────────────────────
function getPool() {
  return scope === 'stamm' ? RAW.filter(function(r){return r.st===1;}) : RAW;
}

function norm(s) { return s.toLowerCase().trim(); }

function search(q) {
  if (!q || q.length < 3 || !dataLoaded) return [];
  var nq = norm(q);
  var isNum = /^\d+$/.test(q);
  var pool = getPool();
  return pool.filter(function(r) {
    if (mode === 'ean' || (mode === 'all' && isNum)) {
      if (r.e13.indexOf(q) === 0 || r.e8.indexOf(q) === 0) return true;
    }
    if (mode === 'nan' || (mode === 'all' && isNum)) {
      if (r.n8.indexOf(q) === 0 || r.n7.indexOf(q) === 0) return true;
    }
    if (mode === 'name' || mode === 'all') {
      if (norm(r.b1).indexOf(nq) !== -1 || norm(r.b2).indexOf(nq) !== -1) return true;
    }
    return false;
  });
}

// ── RENDERING ─────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined) return null;
  return n.toFixed(2).replace('.', ',') + ' \u20ac';
}

function diffClass(vs) {
  if (!vs) return 'diff-gleich';
  if (vs.indexOf('teurer') !== -1) return 'diff-teurer';
  if (vs.indexOf('nstiger') !== -1) return 'diff-guenstiger';
  return 'diff-gleich';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(r, i) {
  var delay = Math.min(i * 25, 300);
  var hasPrice = r.kvk !== null && r.kvk !== undefined;
  var mwstLabel = r.mw === 'E' ? '7% MwSt' : (r.mw === 'R' || r.mw === 'V') ? '19% MwSt' : '';
  var mwstClass = r.mw === 'E' ? 'mwst-e' : 'mwst-r';
  var stamm = r.st === 1;

  var priceHtml = '';
  if (hasPrice) {
    var dlFmt = fmt(r.dl);
    var kvkFmt = fmt(r.kvk);
    var diff = (r.dl !== null && r.dl !== undefined) ? (r.dl - r.kvk) : null;
    var diffFmt = diff !== null ? (diff >= 0 ? '+' : '') + diff.toFixed(2).replace('.', ',') + ' \u20ac' : '\u2013';
    var dc = diffClass(r.vs);
    var vsLabel = r.vs === 'Gleicher Preis' ? '= gleich'
      : r.vs === 'Dorfladen teurer' ? '\u25b2 teurer'
      : (r.vs.indexOf('nstiger') !== -1) ? '\u25bc g\u00fcnstiger'
      : (r.vs || '');
    priceHtml = '<div class="price-block">'
      + (dlFmt ? '<div class="price-box price-dl"><div class="plabel">Dorfladen</div><div class="pval">' + dlFmt + '</div></div>' : '')
      + '<div class="price-box price-rewe"><div class="plabel">REWE KVK</div><div class="pval">' + kvkFmt + '</div></div>'
      + (dlFmt ? '<div class="price-diff ' + dc + '"><div class="plabel">Differenz</div><div class="pval">' + diffFmt + '<br><span style="font-size:10px;font-weight:400">' + vsLabel + '</span></div></div>' : '')
      + '</div>';
  }

  var html = '<div class="result-card' + (stamm ? ' in-stamm' : '') + '" style="animation-delay:' + delay + 'ms">';
  html += '<div class="card-header"><div>';
  html += '<div class="card-title">' + esc(r.b1) + '</div>';
  if (r.b2) html += '<div class="card-brand">' + esc(r.b2) + '</div>';
  html += '</div><div class="badges">';
  if (stamm) html += '<span class="badge badge-stamm">Im Stamm</span>';
  if (r.qu) html += '<span class="badge badge-quelle">' + esc(r.qu) + '</span>';
  html += '</div></div>';
  html += priceHtml;
  html += '<div class="card-grid">';
  html += '<div><div class="field-label">NAN 7-stellig</div><div class="field-val mono">' + (r.n7 || '<span class="empty">\u2013</span>') + '</div></div>';
  html += '<div><div class="field-label">NAN 8-stellig</div><div class="field-val mono">' + (r.n8 || '<span class="empty">\u2013</span>') + '</div></div>';
  html += '<div><div class="field-label">EAN13</div><div class="field-val mono">' + (r.e13 || '<span class="empty">nicht erfasst</span>') + '</div></div>';
  html += '<div><div class="field-label">EAN8</div><div class="field-val mono">' + (r.e8 || '<span class="empty">\u2013</span>') + '</div></div>';
  html += '</div>';
  html += '<div class="card-footer">';
  if (r.wg) html += '<span class="tag">WGR ' + esc(r.wg) + '</span>';
  if (r.wb) html += '<span class="tag">' + esc(r.wb) + '</span>';
  if (mwstLabel) html += '<span class="tag ' + mwstClass + '">' + mwstLabel + '</span>';
  html += '</div></div>';
  return html;
}

function doSearch() {
  var q = input.value.trim();
  var infoEl = document.getElementById('results-info');
  var resultsEl = document.getElementById('results');
  if (!dataLoaded) return;
  if (q.length < 3) {
    infoEl.style.display = 'none';
    var scopeLabel = scope === 'stamm' ? 'Artikelstamm' : 'allen Artikeln';
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">\uD83D\uDED2</div><h3>Artikel suchen</h3><p>Suche in ' + scopeLabel + '.<br>EAN, NAN oder Bezeichnung \u2014 mindestens 3 Zeichen.<br>Oder Kamera-Symbol f\u00fcr Barcode-Scan.</p></div>';
    return;
  }
  currentResults = search(q);
  shown = Math.min(PAGE, currentResults.length);
  infoEl.style.display = 'block';
  if (currentResults.length === 0) {
    infoEl.innerHTML = '';
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">\uD83D\uDD0E</div><h3>Kein Ergebnis</h3><p>F\u00fcr <strong>&quot;' + esc(q) + '&quot;</strong> wurde kein Artikel gefunden.</p></div>';
  } else {
    infoEl.innerHTML = '<strong>' + currentResults.length.toLocaleString('de') + '</strong> Treffer';
    renderPage(resultsEl);
  }
}

function renderPage(container) {
  var html = '';
  for (var i = 0; i < shown; i++) html += renderCard(currentResults[i], i);
  if (shown < currentResults.length) {
    var rem = currentResults.length - shown;
    html += '<button class="more-btn" id="more-btn">Weitere ' + Math.min(PAGE, rem) + ' anzeigen (' + rem + ' verbleibend)</button>';
  }
  container.innerHTML = html;
  var moreBtn = document.getElementById('more-btn');
  if (moreBtn) {
    moreBtn.addEventListener('click', function() {
      shown = Math.min(shown + PAGE, currentResults.length);
      renderPage(container);
    });
  }
}

updateHint();
doSearch();
</script>
</body>
</html>
